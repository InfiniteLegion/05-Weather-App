<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    
    <header>

        <div class="search-block">

            <input type="text" class="search-item" id="search-input" placeholder="Enter city">
            
            <select class="search-item" id="search-select-temperature">
                <option value="metric">&deg; C</option>
                <option value="us">&deg; F</option>
            </select>
            
            <button id="search-btn"></button>
            
        </div>

    </header>

    <div id="modal-error" class="modal-overlay" style="display: none;">
        
        <div class="modal-box">

            <p id="modal-error-text"></p>

            <button id="modal-error-close">OK</button>
        
        </div>
    </div>

    <div id="content"></div>
    
</body>
</html>
